<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VPN Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js?61"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-base"></div>
  <div class="bg-grid"></div>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="bg-noise"></div>

  <div class="app-shell">
    <header class="topbar glass fade-in">
      <div class="topbar-row">
        <div class="profile-mini">
          <img id="userAvatar" class="avatar" src="https://via.placeholder.com/80" alt="avatar" />
          <div class="profile-text">
            <h1 id="userName">Пользователь</h1>
            <p id="userUsername">@username</p>
          </div>
        </div>

        <div class="status-pill">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">VPN не активен</span>
        </div>
      </div>
    </header>

    <main id="appContent" class="content-area fade-in delay-1"></main>
  </div>

  <div id="paymentModal" class="modal hidden">
    <div class="modal-backdrop" id="paymentBackdrop"></div>

    <div class="modal-content glass">
      <div class="modal-header">
        <div>
          <div class="eyebrow">Подтверждение</div>
          <h3>Оплата</h3>
        </div>
        <button id="closePaymentModal" class="icon-btn" type="button" aria-label="Закрыть">✕</button>
      </div>

      <div class="modal-body">
        <div class="summary-box">
          <div class="summary-row">
            <span>Тариф</span>
            <strong id="modalPlanName">—</strong>
          </div>
          <div class="summary-row">
            <span>Устройств</span>
            <strong id="modalDeviceCount">1</strong>
          </div>
          <div class="summary-row discount-row">
            <span>Скидка</span>
            <strong id="modalPlanSave" class="discount-value">—</strong>
          </div>
          <div class="summary-row total-row">
            <span>Сумма</span>
            <strong id="modalPlanPrice">—</strong>
          </div>
        </div>

        <div class="payment-methods">
          <button class="payment-method active" data-method="ЮKassa" type="button">ЮKassa</button>
          <button class="payment-method" data-method="Telegram Stars" type="button">Telegram Stars</button>
          <button class="payment-method" data-method="Криптовалюта" type="button">Криптовалюта</button>
        </div>

        <button id="confirmPaymentBtn" class="primary-btn glow-btn" type="button">Оплатить</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
