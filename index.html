<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль</title>

  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js?61"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="profile-card">
      <img
        id="avatar"
        class="avatar"
        src="https://via.placeholder.com/100"
        alt="avatar"
      />

      <h1 id="name">Имя пользователя</h1>
      <p id="username">@username</p>
      <p class="status">Статус: <span id="statusText">Онлайн</span></p>

      <div class="actions">
        <button id="mainBtn" class="btn">Нажми меня</button>
        <button id="changeStatusBtn" class="btn secondary">Сменить статус</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
