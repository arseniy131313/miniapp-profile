<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VPN Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js?61"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="app-shell">
    <header class="topbar glass fade-in">
      <div class="profile-mini">
        <img id="userAvatar" class="avatar" src="https://via.placeholder.com/80" alt="avatar">
        <div>
          <h1 id="userName">Пользователь</h1>
          <p id="userUsername">@username</p>
        </div>
      </div>
      <div class="topbar-status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">VPN не активен</span>
      </div>
    </header>

    <main id="appContent" class="content-area fade-in delay-1"></main>

    <nav class="bottom-nav glass fade-in delay-2">
      <button class="nav-btn active" data-screen="home">Главная</button>
      <button class="nav-btn" data-screen="plans">Тарифы</button>
      <button class="nav-btn" data-screen="servers">Серверы</button>
      <button class="nav-btn" data-screen="profile">Профиль</button>
    </nav>
  </div>

  <div id="paymentModal" class="modal hidden">
    <div class="modal-backdrop" id="paymentBackdrop"></div>
    <div class="modal-content glass">
      <div class="modal-header">
        <h3>Оплата VPN</h3>
        <button id="closePaymentModal" class="icon-btn">✕</button>
      </div>

      <div class="modal-body">
        <div class="summary-box">
          <div class="summary-row">
            <span>Тариф</span>
            <strong id="modalPlanName">—</strong>
          </div>
          <div class="summary-row">
            <span>Сумма</span>
            <strong id="modalPlanPrice">—</strong>
          </div>
        </div>

        <div class="payment-methods">
          <button class="payment-method active" data-method="ЮKassa">ЮKassa</button>
          <button class="payment-method" data-method="Telegram Stars">Telegram Stars</button>
          <button class="payment-method" data-method="Crypto">Crypto</button>
        </div>

        <button id="confirmPaymentBtn" class="primary-btn">Оплатить</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
